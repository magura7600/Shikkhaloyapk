name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Verify Gradle Wrapper
      run: |
        ./gradlew --version
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Set up Keystore
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
          echo "Decoding release keystore..."
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
        elif [ -f debug.keystore.base64 ]; then
          echo "Decoding existing debug.keystore.base64..."
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "No debug.keystore.base64 found. Generating a new debug keystore on the fly..."
          keytool -genkeypair -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
      
    - name: Create .env file for secrets
      run: |
        SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
        SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}"
        GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
        
        if [ -z "$SUPABASE_URL" ]; then
          SUPABASE_URL="https://gputlynskpbbiexbpphj.supabase.co"
        fi
        if [ -z "$SUPABASE_KEY" ]; then
          SUPABASE_KEY="sb_publishable_NwiSPi0Rl4VAf_B2v5Fp6g_KgwTb_Ol"
        fi
        if [ -z "$GEMINI_API_KEY" ]; then
          GEMINI_API_KEY="MY_GEMINI_API_KEY"
        fi
        
        echo "SUPABASE_URL=$SUPABASE_URL" >> .env
        echo "SUPABASE_KEY=$SUPABASE_KEY" >> .env
        echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
        
    - name: Build Release APK
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: ./gradlew assembleRelease
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Shikkhaloy-Release-APK
        path: app/build/outputs/apk/release/app-release.apk
