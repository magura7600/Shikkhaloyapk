name: Build Release APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Fix Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        gradle wrapper
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 || secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        python3 -c "
        import base64, os, sys
        data = os.environ.get('KEYSTORE_BASE64', '').strip()
        if not data:
            print('ERROR: Neither KEYSTORE_BASE64 nor RELEASE_KEYSTORE_BASE64 secret is set in GitHub Secrets!')
            print('Please configure either of these secrets in your repository Settings -> Secrets and variables -> Actions.')
            sys.exit(1)
        try:
            # Clean all whitespace, newlines, and carriage returns
            cleaned_data = ''.join(data.split())
            # Handle missing base64 padding dynamically
            padding_needed = (4 - len(cleaned_data) % 4) % 4
            cleaned_data += '=' * padding_needed
            
            decoded = base64.b64decode(cleaned_data)
            with open('my-upload-key.jks', 'wb') as f:
                f.write(decoded)
            print('SUCCESS: Keystore decoded successfully to my-upload-key.jks')
        except Exception as e:
            print(f'ERROR: Failed to decode base64 keystore: {e}')
            sys.exit(1)
        "
      
    - name: Create .env file for secrets
      run: |
        SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
        SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}"
        GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
        
        if [ -z "$SUPABASE_URL" ]; then
          SUPABASE_URL="https://gputlynskpbbiexbpphj.supabase.co"
        fi
        if [ -z "$SUPABASE_KEY" ]; then
          SUPABASE_KEY="sb_publishable_NwiSPi0Rl4VAf_B2v5Fp6g_KgwTb_Ol"
        fi
        if [ -z "$GEMINI_API_KEY" ]; then
          GEMINI_API_KEY="MY_GEMINI_API_KEY"
        fi
        
        echo "SUPABASE_URL=$SUPABASE_URL" >> .env
        echo "SUPABASE_KEY=$SUPABASE_KEY" >> .env
        echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
        
    - name: Build Release APK
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'upload' }}
      run: ./gradlew assembleRelease
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Shikkhaloy-Release-APK
        path: app/build/outputs/apk/release/app-release.apk
