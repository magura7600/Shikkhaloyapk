name: Build Release APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Fix and Regenerate Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        gradle wrapper --gradle-version 9.3.1
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
        
    - name: Verify Gradle Wrapper
      run: |
        ./gradlew --version
      
    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 || secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        python3 << 'EOF'
        import base64, os, sys, re
        raw_data = os.environ.get('KEYSTORE_BASE64', '').strip()
        if not raw_data:
            print('ERROR: Neither KEYSTORE_BASE64 nor RELEASE_KEYSTORE_BASE64 secret is set in GitHub Secrets!')
            print('Please configure either of these secrets in your repository Settings -> Secrets and variables -> Actions.')
            sys.exit(1)
        
        try:
            # 1. Clean any markdown backticks or code block formatting
            data = raw_data.replace('`', '').strip()
            
            # 2. Clean data URL prefixes if present
            # e.g., data:application/octet-stream;base64,...
            data_uri_match = re.match(r'^data:[^;]+;base64,(.*)$', data, re.DOTALL | re.IGNORECASE)
            if data_uri_match:
                data = data_uri_match.group(1).strip()
                print('INFO: Removed data URI prefix from secret string.')
            
            # 3. Clean PEM headers and footers
            pem_elements = [
                '-----BEGIN CERTIFICATE-----', '-----END CERTIFICATE-----',
                '-----BEGIN PRIVATE KEY-----', '-----END PRIVATE KEY-----',
                '-----BEGIN KEYSTORE-----', '-----END KEYSTORE-----',
                '-----BEGIN PKCS12-----', '-----END PKCS12-----',
                '-----BEGIN/END CERTIFICATE-----', '---'
            ]
            for elem in pem_elements:
                data = data.replace(elem, '')
            
            # 4. Remove all non-base64 characters
            # Valid chars: A-Z, a-z, 0-9, +, /, =
            cleaned_data = re.sub(r'[^A-Za-z0-9+/=]', '', data)
            
            if len(cleaned_data) < len(raw_data) * 0.8:
                print('WARNING: A significant amount of non-base64 characters were filtered out. The secret may contain corrupted data!')
            
            # 5. Fix padding dynamically
            padding_needed = (4 - len(cleaned_data) % 4) % 4
            cleaned_data += '=' * padding_needed
            
            decoded = base64.b64decode(cleaned_data)
            
            # 6. Verify Keystore Format Magic Bytes
            is_jks = decoded.startswith(b'\xfe\xed\xfe\xed')
            is_pkcs12 = decoded.startswith(b'\x30') # DER Sequence
            
            print(f'INFO: Decoded file size: {len(decoded)} bytes')
            if is_jks:
                print('SUCCESS: Detected valid Java KeyStore (JKS) format magic bytes.')
            elif is_pkcs12:
                print('SUCCESS: Detected valid PKCS12 keystore format magic bytes.')
            else:
                print('CRITICAL WARNING: The decoded bytes DO NOT match any standard Keystore format!')
                print(f'Magic bytes (first 4 bytes): {decoded[:4].hex().upper()}')
                print('This almost certainly means your base64 string is corrupted or was generated from an incorrect file.')
                print('Please verify your KEYSTORE_BASE64 secret contains a clean base64 string of your .jks/.p12 file.')
                print('Command to generate on Windows PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("your-file.jks"))')
                print('Command to generate on Mac/Linux: base64 -i your-file.jks -o -  OR  openssl base64 -A -in your-file.jks')
            
            with open('my-upload-key.jks', 'wb') as f:
                f.write(decoded)
            print('SUCCESS: Decoded keystore written to my-upload-key.jks')
        except Exception as e:
            print(f'ERROR: Exception occurred during base64 decoding: {e}')
            sys.exit(1)
        EOF
      
    - name: Create .env file for secrets
      run: |
        SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
        SUPABASE_KEY="${{ secrets.SUPABASE_KEY }}"
        GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
        
        if [ -z "$SUPABASE_URL" ]; then
          SUPABASE_URL="https://gputlynskpbbiexbpphj.supabase.co"
        fi
        if [ -z "$SUPABASE_KEY" ]; then
          SUPABASE_KEY="sb_publishable_NwiSPi0Rl4VAf_B2v5Fp6g_KgwTb_Ol"
        fi
        if [ -z "$GEMINI_API_KEY" ]; then
          GEMINI_API_KEY="MY_GEMINI_API_KEY"
        fi
        
        echo "SUPABASE_URL=$SUPABASE_URL" >> .env
        echo "SUPABASE_KEY=$SUPABASE_KEY" >> .env
        echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
        
    - name: Verify Keystore and Passwords
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || secrets.STORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'upload' }}
      run: |
        cat << 'EOF' > VerifyKeystore.java
        import java.io.FileInputStream;
        import java.security.KeyStore;
        import java.util.Enumeration;

        public class VerifyKeystore {
            public static void main(String[] args) {
                if (args.length < 4) {
                    System.out.println("Usage: VerifyKeystore <path> <store_pass> <alias> <key_pass>");
                    System.exit(1);
                }
                String path = args[0];
                String storePass = args[1];
                String alias = args[2];
                String keyPass = args[3];
                 System.out.println("================== KEYSTORE VERIFICATION DEBUG ==================");
                 System.out.println("- Keystore Path: " + path);
                 java.io.File f = new java.io.File(path);
                 System.out.println("- Keystore Path exists: " + f.exists());
                 System.out.println("- Keystore File size: " + f.length() + " bytes");
                 System.out.println("- Store Password length: " + (storePass == null ? "null" : storePass.length()));
                 System.out.println("- Key Alias: '" + alias + "' (length: " + (alias == null ? "null" : alias.length()) + ")");
                 System.out.println("- Key Password length: " + (keyPass == null ? "null" : keyPass.length()));
                 System.out.println("================================================================");
                
                KeyStore ks = null;
                String loadedType = null;
                Exception pkcs12Exception = null;
                Exception jksException = null;
                
                // Try loading as PKCS12 first
                try {
                    ks = KeyStore.getInstance("PKCS12");
                    try (FileInputStream fis = new FileInputStream(path)) {
                        ks.load(fis, storePass.toCharArray());
                    }
                    loadedType = "PKCS12";
                    System.out.println("SUCCESS: Keystore file loaded successfully as PKCS12.");
                } catch (Exception e) {
                    pkcs12Exception = e;
                }
                
                // If PKCS12 failed, try loading as JKS
                if (loadedType == null) {
                    try {
                        ks = KeyStore.getInstance("JKS");
                        try (FileInputStream fis = new FileInputStream(path)) {
                            ks.load(fis, storePass.toCharArray());
                        }
                        loadedType = "JKS";
                        System.out.println("SUCCESS: Keystore file loaded successfully as JKS.");
                    } catch (Exception e) {
                        jksException = e;
                    }
                }
                
                if (loadedType == null) {
                    System.out.println("ERROR: Failed to load keystore with either PKCS12 or JKS format.");
                    System.out.println("----------------------------------------");
                    System.out.println("PKCS12 Load Error: " + (pkcs12Exception != null ? pkcs12Exception.toString() : "N/A"));
                    System.out.println("JKS Load Error: " + (jksException != null ? jksException.toString() : "N/A"));
                    System.out.println("----------------------------------------");
                    System.out.println("\n================================ DIAGNOSIS ================================");
                    System.out.println("This means your 'STORE_PASSWORD' (or 'KEYSTORE_PASSWORD') is INCORRECT,");
                    System.out.println("or the keystore file base64 data is corrupted/incomplete.");
                    System.out.println("Please check the 'Decode Keystore' step logs above to verify if magic bytes were detected.");
                    System.out.println("===========================================================================\n");
                    System.exit(5);
                }
                
                try {
                    if (!ks.containsAlias(alias)) {
                        System.out.println("ERROR: The alias '" + alias + "' does NOT exist in the " + loadedType + " keystore!");
                        System.out.print("Available aliases in this keystore: ");
                        Enumeration<String> aliases = ks.aliases();
                        int count = 0;
                        while (aliases.hasMoreElements()) {
                            System.out.print("'" + aliases.nextElement() + "' ");
                            count++;
                        }
                        if (count == 0) {
                            System.out.print("(No aliases found!)");
                        }
                        System.out.println();
                        System.out.println("\n================================ DIAGNOSIS ================================");
                        System.out.println("Your 'KEY_ALIAS' secret is set to '" + alias + "' but that alias is not inside the keystore.");
                        System.out.println("Please set the 'KEY_ALIAS' secret to one of the available aliases listed above.");
                        System.out.println("===========================================================================\n");
                        System.exit(2);
                    }
                    System.out.println("SUCCESS: Alias '" + alias + "' found in the " + loadedType + " keystore.");
                    
                    try {
                        KeyStore.Entry entry = ks.getEntry(alias, new KeyStore.PasswordProtection(keyPass.toCharArray()));
                        if (entry == null) {
                            System.out.println("ERROR: Could not retrieve key entry for alias '" + alias + "'. Entry is null.");
                            System.exit(3);
                        }
                        System.out.println("SUCCESS: Private key decrypted and retrieved successfully!");
                    } catch (Exception e) {
                        System.out.println("ERROR: Failed to decrypt key '" + alias + "' using the provided key password!");
                        System.out.println("Detailed Exception: " + e.toString());
                        System.out.println("\n================================ DIAGNOSIS ================================");
                        System.out.println("This error means your 'KEY_PASSWORD' (key password) is INCORRECT.");
                        System.out.println("Please make sure that the 'KEY_PASSWORD' secret in your GitHub repository is correct.");
                        if ("PKCS12".equals(loadedType)) {
                            System.out.println("Note: Since your keystore is in PKCS12 format, the key password MUST be identical to the store password.");
                        } else {
                            System.out.println("Note: For JKS format, the key password can be different, but must match the password used when generating the key.");
                        }
                        System.out.println("===========================================================================\n");
                        System.exit(4);
                    }
                } catch (Exception e) {
                    System.out.println("ERROR during alias lookup: " + e.toString());
                    System.exit(6);
                }
            }
        }
        EOF
        javac VerifyKeystore.java
        java VerifyKeystore "$KEYSTORE_PATH" "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD"

    - name: Build Release APK
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || secrets.STORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'upload' }}
      run: ./gradlew assembleRelease --no-build-cache
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Shikkhaloy-Release-APK
        path: app/build/outputs/apk/release/app-release.apk
